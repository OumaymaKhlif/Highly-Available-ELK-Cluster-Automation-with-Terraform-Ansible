# ============================================================================
# Rôle: metricbeat - Installation et configuration de Metricbeat 9.x
# Déployé sur tous les nœuds (14 VMs)
# ============================================================================
---
- name: Installer Metricbeat {{ elastic_version }}
  ansible.builtin.apt:
    name: "metricbeat={{ elastic_version }}"
    state: present
    allow_downgrade: yes

- name: Créer le répertoire des certificats Metricbeat
  ansible.builtin.file:
    path: /etc/metricbeat/certs
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Copier le certificat CA
  ansible.builtin.copy:
    src: "/tmp/elk-certs/ca.crt"
    dest: /etc/metricbeat/certs/ca.crt
    owner: root
    group: root
    mode: "0640"

- name: Déployer la configuration metricbeat.yml
  ansible.builtin.template:
    src: metricbeat.yml.j2
    dest: /etc/metricbeat/metricbeat.yml
    owner: root
    group: root
    mode: "0600"
  notify: Redémarrer Metricbeat

- name: Activer les modules Metricbeat
  ansible.builtin.command: metricbeat modules enable system elasticsearch-xpack
  args:
    creates: /etc/metricbeat/modules.d/system.yml
  notify: Redémarrer Metricbeat

- name: Charger les dashboards Kibana (une seule fois)
  ansible.builtin.command: >
    metricbeat setup --dashboards
    -E output.elasticsearch.hosts=["https://{{ es_coordinating_nodes[0] }}:9200"]
    -E output.elasticsearch.username=elastic
    -E output.elasticsearch.password={{ es_elastic_password }}
    -E output.elasticsearch.ssl.certificate_authorities=["/etc/metricbeat/certs/ca.crt"]
    -E setup.kibana.host=https://{{ groups['kibana'][0] }}:5601
    -E setup.kibana.username=elastic
    -E setup.kibana.password={{ es_elastic_password }}
    -E setup.kibana.ssl.certificate_authorities=["/etc/metricbeat/certs/ca.crt"]
  when: inventory_hostname == groups['all'][0]
  ignore_errors: true

- name: Activer et démarrer Metricbeat
  ansible.builtin.systemd:
    name: metricbeat
    state: started
    enabled: yes
