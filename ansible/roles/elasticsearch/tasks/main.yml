# ============================================================================
# Rôle: elasticsearch - Installation et configuration d'Elasticsearch 9.x
# ============================================================================
---
- name: Installer Elasticsearch {{ elastic_version }}
  ansible.builtin.apt:
    name: "elasticsearch={{ elastic_version }}"
    state: present
    allow_downgrade: yes

- name: Créer le répertoire des certificats
  ansible.builtin.file:
    path: "{{ es_certs_dir }}"
    state: directory
    owner: elasticsearch
    group: elasticsearch
    mode: "0750"

- name: Créer le répertoire de snapshots
  ansible.builtin.file:
    path: "{{ es_snapshot_repo_path }}"
    state: directory
    owner: elasticsearch
    group: elasticsearch
    mode: "0750"

- name: Verifier si le certificat CA existe deja
  ansible.builtin.stat:
    path: "{{ es_certs_dir }}/ca.crt"
  register: es_ca_cert_stat

- name: Definir le fait de presence des certificats
  ansible.builtin.set_fact:
    es_certs_present: "{{ es_ca_cert_stat.stat.exists }}"

- name: Déployer la configuration elasticsearch.yml
  ansible.builtin.template:
    src: elasticsearch.yml.j2
    dest: /etc/elasticsearch/elasticsearch.yml
    owner: root
    group: elasticsearch
    mode: "0660"
  notify: Redémarrer Elasticsearch

- name: Déployer la configuration JVM
  ansible.builtin.template:
    src: jvm.options.j2
    dest: /etc/elasticsearch/jvm.options.d/heap.options
    owner: root
    group: elasticsearch
    mode: "0660"
  notify: Redémarrer Elasticsearch

- name: Creer le repertoire override systemd pour Elasticsearch
  ansible.builtin.file:
    path: /etc/systemd/system/elasticsearch.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configurer le override systemd pour memlock
  ansible.builtin.copy:
    dest: /etc/systemd/system/elasticsearch.service.d/override.conf
    content: |
      [Service]
      LimitMEMLOCK=infinity
      LimitNOFILE=65535
      LimitNPROC=4096
    owner: root
    group: root
    mode: "0644"
  notify:
    - Recharger systemd
    - Redémarrer Elasticsearch

- name: Activer le service Elasticsearch
  ansible.builtin.systemd:
    name: elasticsearch
    enabled: yes
    daemon_reload: yes

- name: Créer le keystore si nécessaire
  ansible.builtin.command: /usr/share/elasticsearch/bin/elasticsearch-keystore create
  args:
    creates: /etc/elasticsearch/elasticsearch.keystore

- name: Lister les clés du keystore
  ansible.builtin.command: /usr/share/elasticsearch/bin/elasticsearch-keystore list
  register: es_keystore_list
  changed_when: false

- name: Définir le mot de passe bootstrap.password
  ansible.builtin.shell: |
    echo "{{ es_elastic_password }}" | /usr/share/elasticsearch/bin/elasticsearch-keystore add -x 'bootstrap.password'
  when: "'bootstrap.password' not in es_keystore_list.stdout"

- name: Assurer les permissions sur le keystore
  ansible.builtin.file:
    path: /etc/elasticsearch/elasticsearch.keystore
    owner: root
    group: elasticsearch
    mode: "0660"
