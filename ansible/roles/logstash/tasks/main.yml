# ============================================================================
# Rôle: logstash - Installation et configuration de Logstash 9.x
# ============================================================================
---
- name: Installer Logstash {{ elastic_version }}
  ansible.builtin.apt:
    name: "logstash=1:{{ elastic_version }}-1"
    state: present
    allow_downgrade: yes

- name: Créer le répertoire des certificats Logstash
  ansible.builtin.file:
    path: /etc/logstash/certs
    state: directory
    owner: logstash
    group: logstash
    mode: "0750"

- name: Copier le certificat CA
  ansible.builtin.copy:
    src: "/tmp/elk-certs/ca.crt"
    dest: /etc/logstash/certs/ca.crt
    owner: logstash
    group: logstash
    mode: "0640"

- name: Copier le certificat Logstash
  ansible.builtin.copy:
    src: "/tmp/elk-certs/{{ inventory_hostname }}.crt"
    dest: "/etc/logstash/certs/{{ inventory_hostname }}.crt"
    owner: logstash
    group: logstash
    mode: "0640"

- name: Copier la clé privée Logstash
  ansible.builtin.copy:
    src: "/tmp/elk-certs/{{ inventory_hostname }}.key"
    dest: "/etc/logstash/certs/{{ inventory_hostname }}.key"
    owner: logstash
    group: logstash
    mode: "0600"

- name: Déployer la configuration logstash.yml
  ansible.builtin.template:
    src: logstash.yml.j2
    dest: /etc/logstash/logstash.yml
    owner: root
    group: logstash
    mode: "0660"
  notify: Redémarrer Logstash

- name: Déployer la pipeline principale
  ansible.builtin.template:
    src: pipeline.conf.j2
    dest: /etc/logstash/conf.d/pipeline.conf
    owner: root
    group: logstash
    mode: "0660"
  notify: Redémarrer Logstash

- name: Créer le répertoire jvm.options.d
  ansible.builtin.file:
    path: /etc/logstash/jvm.options.d
    state: directory
    owner: root
    group: logstash
    mode: "0750"

- name: Configurer le heap JVM Logstash
  ansible.builtin.copy:
    dest: /etc/logstash/jvm.options.d/heap.options
    content: |
      -Xms{{ logstash_heap_size }}
      -Xmx{{ logstash_heap_size }}
    owner: root
    group: logstash
    mode: "0660"
  notify: Redémarrer Logstash

- name: Activer et démarrer Logstash
  ansible.builtin.systemd:
    name: logstash
    state: started
    enabled: yes
