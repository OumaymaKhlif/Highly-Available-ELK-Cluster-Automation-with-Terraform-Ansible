# ============================================================================
# Rôle: auditbeat - Audit système et intégrité des fichiers
# Déployé sur tous les nœuds (14 VMs)
# ============================================================================
---
- name: Installer Auditbeat {{ elastic_version }}
  ansible.builtin.apt:
    name: "auditbeat={{ elastic_version }}"
    state: present
    allow_downgrade: yes

- name: Créer le répertoire des certificats Auditbeat
  ansible.builtin.file:
    path: /etc/auditbeat/certs
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Copier le certificat CA
  ansible.builtin.copy:
    src: "/tmp/elk-certs/ca.crt"
    dest: /etc/auditbeat/certs/ca.crt
    owner: root
    group: root
    mode: "0640"

- name: Déployer la configuration auditbeat.yml
  ansible.builtin.template:
    src: auditbeat.yml.j2
    dest: /etc/auditbeat/auditbeat.yml
    owner: root
    group: root
    mode: "0600"
  notify: Redémarrer Auditbeat

- name: Charger les dashboards Auditbeat (une seule fois)
  ansible.builtin.command: >
    auditbeat setup --dashboards
    -E output.elasticsearch.hosts=["https://{{ es_coordinating_nodes[0] }}:9200"]
    -E output.elasticsearch.username=elastic
    -E output.elasticsearch.password={{ es_elastic_password }}
    -E output.elasticsearch.ssl.certificate_authorities=["/etc/auditbeat/certs/ca.crt"]
    -E setup.kibana.host=https://{{ groups['kibana'][0] }}:5601
    -E setup.kibana.ssl.certificate_authorities=["/etc/auditbeat/certs/ca.crt"]
  when: inventory_hostname == groups['all'][0]
  ignore_errors: true

- name: Activer et démarrer Auditbeat
  ansible.builtin.systemd:
    name: auditbeat
    state: started
    enabled: yes
